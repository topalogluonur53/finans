worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip sıkıştırma (Frontend hızı için)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen       8080;
        server_name  localhost 127.0.0.1 _;

        # Frontend: Flutter Web
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            # Mobil/Tarayıcı önbelleğini yönetme
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            if_modified_since off;
            expires off;
            etag off;
        }

        # Service worker ve temel dosyalar asla önbelleğe alınmamalı
        location ~* (service-worker\.js|flutter_service_worker\.js|index\.html)$ {
            root   /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }

        # Backend: Django API Proxy
        location /api/ {
            proxy_pass http://backend:2223/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            
            # Timeout ayarları
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Django Statik Dosyalar
        location /static/ {
            alias /usr/share/nginx/static/;
        }
    }
}
